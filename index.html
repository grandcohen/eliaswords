<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אליאס לאליאס</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #f0f0f5;
      --muted: #aeaecf;
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%, rgba(233,69,96,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,166,35,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }



    h1 {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h3 {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 15px;
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.1;
      max-width: 360px;
      margin-inline: auto;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1.05rem;
      font-family: 'Rubik', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { 
      color: var(--muted); 
      opacity: 0.6; 
    }

    button.add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Rubik', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    button.add-btn:hover { background: #c73352; }
    button.add-btn:active { transform: scale(0.96); }
    button.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Word list ── */
    .words-section {
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .words-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .words-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .word-count {
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 10px;
      min-width: 28px;
      text-align: center;
    }

    .words-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .word-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 500;
      animation: slideIn 0.3s ease both;
      transition: background 0.2s;
    }

    .word-item:hover { background: #1e2240; }

    .word-text { flex: 1; }

    .delete-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--accent); background: rgba(233,69,96,0.12); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast-container {
    position: fixed;
    top: 24px; /* שינוי מ-bottom ל-top */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    z-index: 9999;
    pointer-events: none;
    width: min(calc(100% - 32px), 400px);
  }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.93rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      pointer-events: all;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      overflow: hidden;
    }

    .toast::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 0 14px;
      animation: toastBar var(--duration, 3s) linear forwards;
    }

    .toast.success::after { background: #2ecc71; }
    .toast.error::after   { background: var(--accent); }

    .toast-icon { font-size: 1.3rem; flex-shrink: 0; }
    .toast-msg { flex: 1; line-height: 1.4; }

    .toast-undo {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text);
      font-family: 'Rubik', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .toast-undo:hover { background: rgba(255,255,255,0.18); }

    .toast.hiding {
      animation: toastOut 0.3s ease forwards;
    }

    /* ── Loading spinner ── */
    .loader {
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.95); } /* שינוי מ-20 ל- (20-) */
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
    @keyframes toastOut {
      to { opacity: 0; transform: translateY(10px) scale(0.95); }
    }
    @keyframes toastBar {
      from { width: 100%; }
      to   { width: 0%; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 400px) {
      input[type="text"] { font-size: 0.95rem; padding: 12px 14px; }
      button.add-btn { padding: 12px 14px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div>🪬☀️🫶🏻😍🦙</div>
      <h1>המשחק אליאס</h1>
      <h3>גרסת המרימים</h3>
      <p class="subtitle">
        הוסיפו מילים שמתארות את אליאס או את המרימים
        ונבנה ביחד משחק אליאס אישי
      </p>
    </header>

    <div class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="wordInput"
          placeholder="פה מכניסים... 🐗"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="add-btn" id="addBtn">הוספה</button>
      </div>
    </div>

    <div class="words-section">
      <div class="words-header">
        <span class="words-title">מאגר מילים (<span id="wordCount">0</span>)</span>
        <!--<span class="word-count" id="wordCount">0</span>-->
      </div>
      <div id="wordsList" class="words-list"></div>
    </div>

  </div>

  <div id="toast-container"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getDatabase, ref, push, remove, onValue
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7jr_jfCS_K0xYK_JuTiGjMeBgBQKunDA",
      authDomain: "alias-game-9311c.firebaseapp.com",
      databaseURL: "https://alias-game-9311c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "alias-game-9311c",
      storageBucket: "alias-game-9311c.firebasestorage.app",
      messagingSenderId: "604307949554",
      appId: "1:604307949554:web:261ce211bb8207b8ed8d6b"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const wordsRef = ref(db, 'words');

    // ── Local cache ──
    let wordsCache = {}; // { key: { word, timestamp } }

    // ── Realtime listener ──
    onValue(wordsRef, snapshot => {
      wordsCache = {};
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          wordsCache[child.key] = child.val();
        });
      }
      renderWords();
    });

    // ── Render ──
    function renderWords() {
      const list = document.getElementById('wordsList');
      const countEl = document.getElementById('wordCount');
      const entries = Object.entries(wordsCache).sort((a,b) => (b[1].timestamp||0) - (a[1].timestamp||0));

      countEl.textContent = entries.length;

      if (entries.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🗂️</div>
            עדיין אין מילים במאגר
          </div>`;
        return;
      }

      list.innerHTML = entries.map(([key, val]) => `
      <div class="word-item" id="item-${key}">
        <span class="word-text">${escHtml(val.word)}</span>
      </div>
    `).join('');

      // attach delete listeners
      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteWord(btn.dataset.key));
      });
    }

    // ── Add ──
    async function handleAdd() {
      const input = document.getElementById('wordInput');
      const btn   = document.getElementById('addBtn');
      const raw   = input.value.trim();
      if (!raw) return;

      const word = raw;
      const lower = word.toLowerCase();

      // duplicate check
      const exists = Object.values(wordsCache).some(v => v.word.toLowerCase() === lower);
      if (exists) {
        showToast('error', '⚠️', `המילה "${word}" כבר קיימת, נסו מילה אחרת`);
        input.select();
        return;
      }

      btn.disabled = true;
      try {
        const newRef = await push(wordsRef, { word, timestamp: Date.now() });
        input.value = '';
        const key = newRef.key;

        showToast('success', '✅', `המילה "${word}" התווספה בהצלחה`, () => {
          deleteWord(key);
        });
      } catch(e) {
        showToast('error', '❌', 'שגיאה בהוספה, נסו שוב');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // ── Delete ──
    async function deleteWord(key) {
      try {
        await remove(ref(db, `words/${key}`));
      } catch(e) {
        showToast('error', '❌', 'שגיאה במחיקה, נסו שוב');
      }
    }

    // ── Wire up button & Enter key ──
    document.getElementById('addBtn').addEventListener('click', handleAdd);
    document.getElementById('wordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAdd();
    });

    // ── Toast ──
    function showToast(type, icon, msg, undoFn) {
      const container = document.getElementById('toast-container');
      const duration = 3500;

      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.style.setProperty('--duration', `${duration}ms`);

      t.innerHTML = `
        <span class="toast-icon">${icon}</span>
        <span class="toast-msg">${escHtml(msg)}</span>
        ${undoFn ? `<button class="toast-undo">ביטול</button>` : ''}
      `;

      if (undoFn) {
        t.querySelector('.toast-undo').addEventListener('click', () => {
          undoFn();
          dismiss(t);
        });
      }

      container.appendChild(t);

      const timer = setTimeout(() => dismiss(t), duration);

      function dismiss(el) {
        clearTimeout(timer);
        el.classList.add('hiding');
        el.addEventListener('animationend', () => el.remove(), { once: true });
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
